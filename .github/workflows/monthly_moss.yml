name: Monthly AppFolio Data Pull — Moss

on:
  schedule:
    # Runs daily at 10am UTC from the 15th to 25th of each month
    # (one hour after the Niron job so they don't race on AppFolio cookies).
    - cron: "0 10 15-25 * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright pdfplumber google-auth google-auth-httplib2 google-api-python-client
          playwright install chromium

      - name: Run Moss automation
        id: automation
        env:
          APPFOLIO_EMAIL: ${{ secrets.APPFOLIO_EMAIL }}
          APPFOLIO_PASSWORD: ${{ secrets.APPFOLIO_PASSWORD }}
          MOSS_SHEET_ID: ${{ secrets.MOSS_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          APPFOLIO_COOKIES: ${{ secrets.APPFOLIO_COOKIES }}
        run: python automation/run_moss.py

      - name: Save updated cookies
        if: steps.automation.outputs.new_cookies != ''
        uses: gliech/create-github-secret-action@v1
        with:
          name: APPFOLIO_COOKIES
          value: ${{ steps.automation.outputs.new_cookies }}
          pa_token: ${{ secrets.PAT_TOKEN }}
