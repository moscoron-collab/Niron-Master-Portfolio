# Monthly Automation Workflow
name: Monthly AppFolio Data Pull

on:
  schedule:
    - cron: "0 9 15-25 * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright pdfplumber google-auth google-auth-httplib2 google-api-python-client
          playwright install chromium

      - name: Run automation
        id: automation
        env:
          APPFOLIO_EMAIL: ${{ secrets.APPFOLIO_EMAIL }}
          APPFOLIO_PASSWORD: ${{ secrets.APPFOLIO_PASSWORD }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          APPFOLIO_COOKIES: ${{ secrets.APPFOLIO_COOKIES }}
        run: python automation/run.py

      - name: Save updated cookies
        if: steps.automation.outputs.new_cookies != ''
        uses: gliech/create-github-secret-action@v1
        with:
          name: APPFOLIO_COOKIES
          value: ${{ steps.automation.outputs.new_cookies }}
          pa_token: ${{ secrets.GITHUB_TOKEN }}
