name: Monthly AppFolio Data Pull

on:
  schedule:
    # Runs daily at 12pm EDT / 4pm UTC from the 15th to 25th of each month
    - cron: "0 16 15-25 * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright pdfplumber google-auth google-auth-httplib2 google-api-python-client
          playwright install chromium

      - name: Run automation
        id: automation
        env:
          APPFOLIO_EMAIL: ${{ secrets.APPFOLIO_EMAIL }}
          APPFOLIO_PASSWORD: ${{ secrets.APPFOLIO_PASSWORD }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          APPFOLIO_COOKIES: ${{ secrets.APPFOLIO_COOKIES }}
        run: python automation/run.py

      - name: Send dashboard updated notification
        if: steps.automation.outcome == 'success' && steps.automation.outputs.wrote_data == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: moscoron@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: Niron Automation <moscoron@gmail.com>
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          subject: "Niron Master Portfolio — Dashboard Updated"
          body: |
            The monthly AppFolio data pull completed successfully.

            New month data has been written to the History tab of your Google Sheet
            and is now visible on the Niron Master Portfolio dashboard.

            Run details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Save updated cookies
        if: steps.automation.outputs.new_cookies != ''
        continue-on-error: true
        uses: gliech/create-github-secret-action@v1
        with:
          name: APPFOLIO_COOKIES
          value: ${{ steps.automation.outputs.new_cookies }}
          pa_token: ${{ secrets.GITHUB_TOKEN }}
