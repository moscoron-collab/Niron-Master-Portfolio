<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niron Master Portfolio</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #090d12 0%, #0c1a2e 100%);
    color: #ccd9ea; min-height: 100vh; padding: 24px;
  }
  .container { max-width: 1400px; margin: 0 auto; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 28px; margin-bottom: 24px;
    background: rgba(14, 22, 38, 0.8);
    border: 1px solid #1e2d42; border-radius: 12px;
  }
  header h1 { color: #ffffff; font-size: 26px; font-weight: 600; }
  header h1 .accent { color: #f0a500; }
  .meta { font-size: 13px; color: #4e6d8c; text-align: right; }
  .meta .label { color: #00BFFF; font-weight: 500; }
  .logout-btn {
    background: none; border: 1px solid #1e2d42; color: #4e6d8c;
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
    font-size: 11px; margin-left: 12px;
  }
  .logout-btn:hover { color: #ff4455; border-color: #ff4455; }
  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .summary-card {
    background: rgba(14, 22, 38, 0.8); border: 1px solid #1e2d42;
    border-radius: 12px; padding: 20px;
    transition: transform 0.15s, border-color 0.15s;
  }
  .summary-card:hover { transform: translateY(-2px); border-color: #0080cc; }
  .summary-card .label {
    font-size: 11px; color: #4e6d8c; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 8px;
  }
  .summary-card .value { font-size: 26px; font-weight: 700; color: #ffffff; }
  .summary-card .sublabel { font-size: 12px; color: #4e6d8c; margin-top: 6px; }
  .summary-card.green .value { color: #00c97a; }
  .summary-card.red .value { color: #ff4455; }
  .summary-card.gold .value { color: #f0a500; }
  .summary-card.dual {
    display: flex; gap: 16px; align-items: stretch;
  }
  .summary-card.dual > div { flex: 1; }
  .summary-card.dual .divider {
    width: 1px; background: #1e2d42;
  }
  .summary-card.dual .ytd-label { color: #00BFFF; }
  .summary-card.dual .ytd-value { font-size: 22px; }
  .section {
    background: rgba(14, 22, 38, 0.8); border: 1px solid #1e2d42;
    border-radius: 12px; padding: 24px; margin-bottom: 24px;
  }
  .section h2 {
    color: #ffffff; font-size: 18px; margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 1px solid #1e2d42;
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }
  .section h2 .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00BFFF; box-shadow: 0 0 8px #00BFFF;
  }
  .month-select {
    margin-left: auto; padding: 8px 12px;
    background: #0a1520; border: 1px solid #1e2d42;
    color: #ffffff; border-radius: 8px;
    font-size: 14px; cursor: pointer; outline: none;
    min-width: 160px;
  }
  .month-select:hover, .month-select:focus { border-color: #00BFFF; }
  .llc-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .llc-card {
    background: linear-gradient(135deg, #0d1825 0%, #111620 100%);
    border: 1px solid #1e2d42; border-radius: 10px; padding: 18px;
  }
  .llc-card h3 {
    color: #ffffff; font-size: 15px; margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid #1e2d42;
  }
  .llc-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
  .llc-row .k { color: #4e6d8c; }
  .llc-row .v { color: #ccd9ea; font-weight: 500; }
  .llc-row .v.green { color: #00c97a; }
  .llc-row .v.red { color: #ff4455; }
  .llc-row.total {
    border-top: 1px solid #1e2d42; margin-top: 6px;
    padding-top: 10px; font-size: 15px; font-weight: 600;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 12px 10px; color: #4e6d8c;
    font-weight: 500; text-transform: uppercase; font-size: 11px;
    letter-spacing: 1px; border-bottom: 1px solid #1e2d42;
  }
  td { padding: 12px 10px; color: #ccd9ea; border-bottom: 1px solid #182030; }
  tr:hover td { background: rgba(0, 191, 255, 0.05); }
  .green { color: #00c97a; font-weight: 600; }
  .red { color: #ff4455; font-weight: 600; }
  .chart-container { position: relative; height: 380px; }
  .loading { text-align: center; padding: 80px 20px; color: #4e6d8c; }
  .loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid #1e2d42; border-top-color: #00BFFF;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    color: #ff4455; padding: 20px; background: rgba(255, 68, 85, 0.1);
    border: 1px solid #ff4455; border-radius: 8px;
  }
  .login-overlay {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #090d12 0%, #0c1a2e 100%);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .login-box {
    background: rgba(14, 22, 38, 0.95);
    border: 1px solid #1e2d42; border-radius: 14px;
    padding: 40px 36px; max-width: 380px; width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .login-box .lock-icon { font-size: 42px; margin-bottom: 12px; }
  .login-box h2 { color: #ffffff; font-size: 20px; margin-bottom: 8px; font-weight: 600; }
  .login-box p { color: #4e6d8c; font-size: 13px; margin-bottom: 24px; }
  .login-box input {
    width: 100%; padding: 12px 14px; margin-bottom: 12px;
    background: #0a1520; border: 1px solid #1e2d42;
    border-radius: 8px; color: #ffffff; font-size: 15px; outline: none;
  }
  .login-box input:focus { border-color: #00BFFF; }
  .login-box button {
    width: 100%; padding: 12px;
    background: #0080cc; color: #ffffff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .login-box button:hover { background: #00BFFF; }
  .login-box .err { color: #ff4455; font-size: 13px; margin-top: 8px; min-height: 18px; }
  @media (max-width: 768px) {
    body { padding: 12px; }
    header { flex-direction: column; gap: 10px; align-items: flex-start; }
    .meta { text-align: left; }
    .month-select { margin-left: 0; margin-top: 8px; }
    .summary-card.dual { flex-direction: column; }
    .summary-card.dual .divider { width: 100%; height: 1px; }
  }
</style>
</head>
<body>

<div id="login-screen" class="login-overlay">
  <div class="login-box">
    <div class="lock-icon">🔒</div>
    <h2>Niron Master Portfolio</h2>
    <p>Enter password to access the dashboard</p>
    <input type="password" id="pwd-input" placeholder="Password" autocomplete="off">
    <button id="pwd-btn">Unlock</button>
    <div class="err" id="pwd-err"></div>
  </div>
</div>

<div class="container" id="main-container" style="display:none">
  <header>
    <h1><span class="accent">●</span> NIRON MASTER PORTFOLIO</h1>
    <div class="meta">
      <div><span class="label">Last Updated:</span> <span id="last-updated">—</span></div>
      <div>
        <span class="label">Status:</span> <span id="status" style="color:#00c97a">● Live</span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading portfolio data...</div>
    </div>
  </div>
</div>

<script>
const PASSWORD_HASH = "76818309665bee769203a5117621375d41ef7f7aa9cee390dc8ec586e2dd664c";
const API_URL = "https://script.google.com/macros/s/AKfycbzXtgU_bEQx-3B15FoV4SrolI1int0s6PUo9WKnHJ2Wz8zV5jq62MWNFQLjI51OqsWH/exec";

let PORTFOLIO_DATA = null;
let SELECTED_MONTH = null;

async function sha256(text) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, "0")).join("");
}

async function tryLogin() {
  const input = document.getElementById("pwd-input");
  const err = document.getElementById("pwd-err");
  const pwd = input.value;
  if (!pwd) return;
  const h = await sha256(pwd);
  if (h === PASSWORD_HASH) {
    localStorage.setItem("niron_auth", "ok");
    showDashboard();
  } else {
    err.textContent = "Incorrect password";
    input.value = ""; input.focus();
  }
}

function showDashboard() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("main-container").style.display = "block";
  load();
}

function logout() {
  localStorage.removeItem("niron_auth");
  location.reload();
}

document.getElementById("pwd-btn").addEventListener("click", tryLogin);
document.getElementById("pwd-input").addEventListener("keypress", e => { if (e.key === "Enter") tryLogin(); });

if (localStorage.getItem("niron_auth") === "ok") {
  showDashboard();
} else {
  document.getElementById("pwd-input").focus();
}

const fmt = n => "$" + (Number(n) || 0).toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});
const fmtShort = n => {
  n = Number(n) || 0;
  if (Math.abs(n) >= 1e6) return "$" + (n/1e6).toFixed(2) + "M";
  if (Math.abs(n) >= 1e3) return "$" + (n/1e3).toFixed(1) + "K";
  return "$" + n.toFixed(0);
};

const monthLabel = ym => {
  if (!ym) return "";
  const [y, m] = ym.split("-");
  const names = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return names[parseInt(m,10)-1] + " " + y;
};

async function load() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    PORTFOLIO_DATA = data;
    initialRender(data);
  } catch (e) {
    document.getElementById("content").innerHTML =
      '<div class="error">Failed to load: ' + e.message + '</div>';
    document.getElementById("status").textContent = "● Offline";
    document.getElementById("status").style.color = "#ff4455";
  }
}

function initialRender(data) {
  document.getElementById("last-updated").textContent = new Date(data.last_updated).toLocaleString();
  const history = data.history || [];
  const months = [...new Set(history.map(h => h.period_start))].sort().reverse();
  SELECTED_MONTH = months[0] || "";
  renderAll();
}

function renderAll() {
  const data = PORTFOLIO_DATA;
  if (!data) return;
  const el = document.getElementById("content");
  const history = data.history || [];
  const llcs = data.llcs || [];
  const loans = data.loans || [];

  const months = [...new Set(history.map(h => h.period_start))].sort().reverse();
  const selectedRows = history.filter(h => h.period_start === SELECTED_MONTH);
  selectedRows.sort((a, b) => a.llc.localeCompare(b.llc));

  const totalDisb = selectedRows.reduce((s, r) => s + r.disbursement, 0);
  const totalNet = selectedRows.reduce((s, r) => s + r.net_cashflow, 0);
  const totalMortgage = selectedRows.reduce((s, r) => s + r.mortgage, 0);
  const totalValue = llcs.reduce((s, l) => s + l.property_value, 0);

  // YTD calculations
  const selectedYear = SELECTED_MONTH ? SELECTED_MONTH.slice(0, 4) : "";
  const ytdRows = history.filter(h =>
    h.period_start && h.period_start.slice(0,4) === selectedYear && h.period_start <= SELECTED_MONTH
  );
  const ytdDisb = ytdRows.reduce((s, r) => s + r.disbursement, 0);
  const ytdNet = ytdRows.reduce((s, r) => s + r.net_cashflow, 0);
  const ytdSubLabel = `Jan – ${monthLabel(SELECTED_MONTH).split(' ')[0]} ${selectedYear}`;

  const sortedHistory = history.slice().sort((a, b) => {
    if (a.period_start !== b.period_start) return b.period_start > a.period_start ? 1 : -1;
    return a.llc.localeCompare(b.llc);
  });

  const monthOptions = months.map(m =>
    `<option value="${m}" ${m === SELECTED_MONTH ? 'selected' : ''}>${monthLabel(m)}</option>`
  ).join('');

  el.innerHTML = `
    <div class="summary-grid">
      <div class="summary-card dual">
        <div>
          <div class="label gold" style="color:#f0a500">Total Disbursements</div>
          <div class="value" style="color:#f0a500">${fmtShort(totalDisb)}</div>
          <div class="sublabel">${monthLabel(SELECTED_MONTH) || 'No data'}</div>
        </div>
        <div class="divider"></div>
        <div>
          <div class="label ytd-label">YTD</div>
          <div class="value ytd-value" style="color:#f0a500">${fmtShort(ytdDisb)}</div>
          <div class="sublabel">${ytdSubLabel}</div>
        </div>
      </div>

      <div class="summary-card dual">
        <div>
          <div class="label" style="color:${totalNet >= 0 ? '#00c97a' : '#ff4455'}">Net Cashflow</div>
          <div class="value" style="color:${totalNet >= 0 ? '#00c97a' : '#ff4455'}">${fmtShort(totalNet)}</div>
          <div class="sublabel">After all expenses</div>
        </div>
        <div class="divider"></div>
        <div>
          <div class="label ytd-label">YTD</div>
          <div class="value ytd-value" style="color:${ytdNet >= 0 ? '#00c97a' : '#ff4455'}">${fmtShort(ytdNet)}</div>
          <div class="sublabel">${ytdSubLabel}</div>
        </div>
      </div>

      <div class="summary-card">
        <div class="label">Total Mortgage / Mo</div>
        <div class="value">${fmtShort(totalMortgage)}</div>
        <div class="sublabel">Across all LLCs</div>
      </div>
      <div class="summary-card">
        <div class="label">Portfolio Value</div>
        <div class="value">${fmtShort(totalValue)}</div>
        <div class="sublabel">Estimated</div>
      </div>
    </div>

    <div class="section">
      <h2>
        <span class="dot"></span>
        <span>Monthly Breakdown</span>
        <select id="month-select" class="month-select" onchange="onMonthChange(this.value)">
          ${monthOptions}
        </select>
      </h2>
      <div class="llc-grid">
        ${selectedRows.map(r => {
          const net = r.net_cashflow;
          const cls = net >= 0 ? 'green' : 'red';
          return `
            <div class="llc-card">
              <h3>${r.llc}</h3>
              <div class="llc-row"><span class="k">Disbursement</span><span class="v">${fmt(r.disbursement)}</span></div>
              <div class="llc-row"><span class="k">Mgmt Fees</span><span class="v">${fmt(r.mgmt_fee)}</span></div>
              <div class="llc-row"><span class="k">Mortgage</span><span class="v">${fmt(r.mortgage)}</span></div>
              <div class="llc-row"><span class="k">Tax / 12</span><span class="v">${fmt(r.tax_mo)}</span></div>
              <div class="llc-row"><span class="k">Insurance / 12</span><span class="v">${fmt(r.ins_mo)}</span></div>
              <div class="llc-row"><span class="k">Maintenance</span><span class="v">${fmt(r.maintenance)}</span></div>
              <div class="llc-row total"><span class="k">Net Cashflow</span><span class="v ${cls}">${fmt(net)}</span></div>
            </div>`;
        }).join('') || '<div style="color:#4e6d8c">No data for this month.</div>'}
      </div>
    </div>

    ${months.length > 1 ? `
    <div class="section">
      <h2><span class="dot"></span>Cashflow Trend (Bars per LLC + Total Line)</h2>
      <div class="chart-container"><canvas id="trendChart"></canvas></div>
    </div>` : ''}

    ${loans.length ? `
    <div class="section">
      <h2><span class="dot"></span>Loan Balances</h2>
      <table>
        <thead><tr><th>LLC</th><th>Lender</th><th>Original</th><th>Remaining</th><th>Monthly</th><th>Maturity</th></tr></thead>
        <tbody>
          ${loans.map(l => `
            <tr>
              <td>${l.llc}</td><td>${l.lender}</td>
              <td>${fmt(l.original_balance)}</td>
              <td style="color:#f0a500;font-weight:600">${fmt(l.balance_override || l.calculated_balance)}</td>
              <td>${fmt(l.monthly_payment)}</td>
              <td>${l.maturity_date || '—'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}

    <div class="section">
      <h2><span class="dot"></span>History (newest first)</h2>
      <table>
        <thead><tr><th>Month</th><th>LLC</th><th>Disbursement</th><th>Mortgage</th><th>Net</th></tr></thead>
        <tbody>
          ${sortedHistory.slice(0, 100).map(h => `
            <tr>
              <td>${h.period_start}</td><td>${h.llc}</td>
              <td>${fmt(h.disbursement)}</td>
              <td>${fmt(h.mortgage)}</td>
              <td class="${h.net_cashflow >= 0 ? 'green' : 'red'}">${fmt(h.net_cashflow)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  if (months.length > 1) renderChart(history, months);
}

function onMonthChange(newMonth) {
  SELECTED_MONTH = newMonth;
  renderAll();
}

function renderChart(history, months) {
  const sortedMonths = months.slice().reverse();
  const llcNames = [...new Set(history.map(h => h.llc))].sort();
  const colors = ['#00c97a', '#0080cc', '#f0a500', '#ff4455', '#00BFFF', '#a78bfa'];

  const datasets = llcNames.map((llc, i) => ({
    type: 'bar', label: llc,
    data: sortedMonths.map(m => {
      const r = history.find(h => h.period_start === m && h.llc === llc);
      return r ? r.net_cashflow : 0;
    }),
    backgroundColor: colors[i % colors.length] + 'aa',
    borderColor: colors[i % colors.length],
    borderWidth: 1, order: 2,
  }));

  const totalData = sortedMonths.map(m =>
    history.filter(h => h.period_start === m).reduce((s, r) => s + (r.net_cashflow || 0), 0)
  );
  datasets.push({
    type: 'line', label: 'TOTAL Portfolio', data: totalData,
    borderColor: '#ffffff', backgroundColor: 'rgba(255,255,255,0.1)',
    borderWidth: 3, pointRadius: 5,
    pointBackgroundColor: '#ffffff', pointBorderColor: '#0c1a2e', pointBorderWidth: 2,
    tension: 0.3, fill: false, order: 1,
  });

  new Chart(document.getElementById('trendChart'), {
    type: 'bar',
    data: { labels: sortedMonths, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#ccd9ea', font: { size: 12 } } },
        tooltip: {
          backgroundColor: '#0c1a2e', borderColor: '#1e2d42',
          borderWidth: 1, titleColor: '#ffffff', bodyColor: '#ccd9ea',
        }
      },
      scales: {
        x: { ticks: { color: '#4e6d8c' }, grid: { color: '#182030' } },
        y: { ticks: { color: '#4e6d8c', callback: v => fmtShort(v) }, grid: { color: '#182030' } }
      }
    }
  });
}
</script>
</body>
</html>
